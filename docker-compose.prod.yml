version: '3.8'
services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    networks:
      - telechat-net
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prod
    networks:
      - telechat-net
  nginx:
    image: nginx:alpine
    depends_on:
      - client
      - server
    volumes:
      - ./client/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    networks:
      - telechat-net
networks:
  telechat-net:
    driver: bridge
